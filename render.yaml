services:
  - type: web
    name: auto-caller-crm-server
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: static
    name: auto-caller-crm
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

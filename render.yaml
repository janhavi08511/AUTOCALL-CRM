services:
  - type: web
    name: auto-caller-crm-server
    env: node
    rootDir: server
    buildCommand: npm install --save-exact prisma@5.7.0 @prisma/client@5.7.0 && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000

  - type: web
    name: auto-caller-crm
    env: static
    buildCommand: npm install && npx vite build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
